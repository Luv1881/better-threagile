id: ai-ml-vector-store-no-encryption
title: AI/ML - Vector Store Without Encryption at Rest
function: architecture
stride: information-disclosure
cwe: 312
description: >
  Vector stores that persist embedding vectors without encryption at rest expose
  the semantic content of the original documents to anyone with low-level storage
  access. Although embedding vectors are not plaintext, recent research demonstrates
  that text can be reconstructed from embeddings with high fidelity using inversion
  attacks. Vector stores frequently hold embeddings of sensitive enterprise content
  (contracts, medical records, source code) ingested into RAG pipelines, making
  unencrypted storage a significant confidentiality risk.
impact: >
  An attacker with storage-layer access (cloud support, exfiltrated keys, physical
  media) can recover near-plaintext content from unencrypted embeddings using text
  inversion techniques. In a breach scenario, unencrypted embeddings of PII-containing
  documents require mandatory breach notification under GDPR and HIPAA.
asvs: V6 - Stored Cryptography Verification Requirements
cheat_sheet: https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html
action: Enable encryption at rest on all vector store volumes and index files
mitigation: >
  Enable volume-level or database-level encryption on the vector store using
  provider-managed or customer-managed keys (SSE-KMS, CMEK, LUKS). For
  self-hosted deployments (Qdrant, Weaviate, Milvus, Chroma), configure full-disk
  encryption on the underlying storage. Update the encryption field on the asset
  to transparent or higher once encryption is enabled.
check: >
  Is encryption at rest enabled on all vector store volumes and index files?
  Are customer-managed KMS keys used when the store contains confidential embeddings?
detection_logic: >
  In-scope technical assets with vector_store technology that have encryption set
  to none.
risk_assessment: >
  High when the vector store indexes embeddings of confidential, PII-containing,
  or proprietary documents. Medium for stores containing only public-domain content.
false_positives: >
  Vector stores holding only embeddings of public, non-sensitive content where
  encryption provides no material security benefit. Set encryption to transparent
  or document the justification.

controls:
  nist_800_53: [SC-28, SC-28(1)]
  iso_27001: [A.10.1.1, A.18.1.5]
  soc2_cc: [CC6.1, CC6.7]
  pci_dss_4: ["3.5.1"]
  hipaa: ["164.312(a)(2)(iv)", "164.312(e)(2)(ii)"]
  nis2: ["Art. 21(2)(g)"]
  owasp_top10_2021: [A02]
  asvs_4: [V6.2, V6.3]
  owasp_llm_top10: [LLM06]

risk:
  id:
    parameter: tech_asset
    id: "{$risk.id}@{tech_asset.id}"

  data:
    parameter: tech_asset
    title: "<b>Vector Store No Encryption</b>: vector store <b>{tech_asset.title}</b> persists embeddings without encryption at rest"
    severity: "calculate_severity(likely, high)"
    exploitation_likelihood: likely
    exploitation_impact: high
    data_breach_probability: probable
    data_breach_technical_assets:
      - "{tech_asset.id}"
    most_relevant_technical_asset: "{tech_asset.id}"

  match:
    parameter: tech_asset
    do:
      - if:
          and:
            - false: "{tech_asset.out_of_scope}"
            - any:
                in: "{tech_asset.technologies}"
                true: "{.attributes.vector_store}"
            - equal:
                first: "{tech_asset.encryption}"
                second: none
          then:
            return: true
