id: iam-long-lived-credentials
title: Cloud IAM - Long-Lived API Keys or Access Credentials Detected
function: operations
stride: elevation-of-privilege
cloud-native: iam
cwe: 798
description: >
  Long-lived API keys and access credentials (static IAM access key IDs and secrets)
  are a leading cause of cloud credential compromise. Unlike short-lived credentials
  issued by IAM roles and instance profiles, static keys do not expire and are
  frequently leaked through code repositories, container images, logs, and misconfigured
  storage. An attacker with a static key has indefinite access until the key is
  manually revoked.
impact: >
  Leaked long-lived credentials can give attackers persistent, undetected access to
  cloud resources. The attacker can exfiltrate data, provision resources for
  cryptomining, or pivot to escalate privileges across the account.
asvs: V2 - Authentication Verification Requirements
cheat_sheet: https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
action: Replace long-lived API keys with short-lived role-based credentials and revoke existing keys
mitigation: >
  Replace all long-lived API keys with IAM roles, instance profiles, workload identity,
  or OIDC federation that issue short-lived credentials automatically. Audit all
  service accounts and revoke unused static keys. Configure automatic credential
  rotation (maximum 90-day TTL). Remove the has-long-lived-api-key tag after migration.
check: >
  Are any long-lived API keys or static credentials still in use?
  Is key rotation enforced by policy across all service accounts?
detection_logic: >
  In-scope technical assets tagged with has-long-lived-api-key that do not also
  carry the has-key-rotation tag.
risk_assessment: >
  High when the asset handles sensitive data or has broad cloud permissions.
  Medium when usage is scoped to read-only or non-sensitive operations.
false_positives: >
  Remove the has-long-lived-api-key tag once all static keys have been replaced
  with short-lived role-based credentials. If rotation is enforced (<=90 days),
  add has-key-rotation to reduce severity.

controls:
  nist_800_53: [IA-5, IA-5(1), AC-2]
  iso_27001: [A.9.2.4, A.9.4.3]
  soc2_cc: [CC6.1, CC6.3]
  pci_dss_4: ["8.3.9", "8.3.10"]
  hipaa: ["164.312(d)"]
  cmmc: [IA.L2-3.5.7]
  owasp_top10_2021: [A07]
  asvs_4: [V2.1, V2.10]

risk:
  id:
    parameter: tech_asset
    id: "{$risk.id}@{tech_asset.id}"

  data:
    parameter: tech_asset
    title: "<b>Cloud IAM - Long-Lived Keys</b>: asset <b>{tech_asset.title}</b> uses static long-lived API credentials"
    severity: "calculate_severity(likely, high)"
    exploitation_likelihood: likely
    exploitation_impact: high
    data_breach_probability: probable
    data_breach_technical_assets:
      - "{tech_asset.id}"
    most_relevant_technical_asset: "{tech_asset.id}"

  match:
    parameter: tech_asset
    do:
      - if:
          and:
            - false: "{tech_asset.out_of_scope}"
            - contains:
                item: has-long-lived-api-key
                in: "{tech_asset.tags}"
            - not:
                contains:
                  item: has-key-rotation
                  in: "{tech_asset.tags}"
          then:
            return: true
