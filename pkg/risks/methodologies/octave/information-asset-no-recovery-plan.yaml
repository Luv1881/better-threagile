id: octave-no-recovery-plan
title: OCTAVE Allegro - High-Criticality Information Asset Container Without Disaster Recovery Plan
function: business-side
stride: elevation-of-privilege
cwe: 654
description: >
  OCTAVE Allegro evaluates organisational resilience alongside confidentiality threats.
  A high-criticality information asset container without a tested disaster recovery
  plan leaves the organisation unable to restore operations within an acceptable
  recovery time objective (RTO) following a destructive event such as ransomware,
  datacenter failure, or catastrophic data corruption. The OCTAVE Allegro area-of-concern
  for availability requires explicit recovery planning for all critical information assets.
impact: >
  Without a disaster recovery plan, loss of a high-criticality information asset
  container can result in extended operational outages, permanent data loss, breach
  of service level agreements, and significant financial and reputational damage.
  Regulated industries may face enforcement action for failure to demonstrate business
  continuity for critical data systems.
asvs: V1 - Architecture, Design and Threat Modeling Requirements
cheat_sheet: https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html
action: Develop, document, and test a disaster recovery plan for all high-criticality information asset containers
mitigation: >
  Define and document a disaster recovery plan covering RTO and RPO targets, recovery
  procedures, responsible personnel, and communication chains. Test the plan with
  scheduled DR exercises at least annually. Include the asset in the business continuity
  plan. Tag the asset has-disaster-recovery once the plan is documented and validated.
check: >
  Is a documented and tested disaster recovery plan in place for this high-criticality
  information asset container?
  Have DR exercises been conducted within the past 12 months?
detection_logic: >
  In-scope technical assets tagged with information-asset-container and criticality-high
  that are not tagged with has-disaster-recovery.
risk_assessment: >
  High baseline for all high-criticality information asset containers without DR.
  Elevated when the asset is the sole source of truth for critical business data.
false_positives: >
  Assets where the disaster recovery plan is inherited from a platform-level DR
  framework (e.g., managed cloud database with multi-region replication).
  Tag has-disaster-recovery after confirming the platform DR covers this asset's
  RTO/RPO requirements.

controls:
  nist_800_53: [CP-2, CP-4, CP-6, CP-9]
  iso_27001: [A.17.1.1, A.17.1.2, A.17.1.3]
  soc2_cc: [A1.2, A1.3]
  pci_dss_4: ["12.3.4"]
  hipaa: ["164.308(a)(7)(i)", "164.308(a)(7)(ii)(B)"]
  nis2: ["Art. 21(2)(c)"]
  cmmc: [RE.L2-3.8.9, CA.L2-3.12.4]
  owasp_top10_2021: [A05, A09]
  asvs_4: [V1.1, V1.9]

risk:
  id:
    parameter: tech_asset
    id: "{$risk.id}@{tech_asset.id}"

  data:
    parameter: tech_asset
    title: "<b>No Recovery Plan</b>: high-criticality information asset container <b>{tech_asset.title}</b> lacks a disaster recovery plan"
    severity: "calculate_severity(likely, high)"
    exploitation_likelihood: likely
    exploitation_impact: high
    data_breach_probability: possible
    data_breach_technical_assets:
      - "{tech_asset.id}"
    most_relevant_technical_asset: "{tech_asset.id}"

  match:
    parameter: tech_asset
    do:
      - if:
          and:
            - false: "{tech_asset.out_of_scope}"
            - contains:
                item: information-asset-container
                in: "{tech_asset.tags}"
            - contains:
                item: criticality-high
                in: "{tech_asset.tags}"
            - not:
                contains:
                  item: has-disaster-recovery
                  in: "{tech_asset.tags}"
          then:
            return: true
