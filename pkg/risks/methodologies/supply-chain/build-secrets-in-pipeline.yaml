id: supply-chain-build-secrets-exposure
title: Supply Chain - Build Pipeline With Potentially Exposed Secrets
function: development
stride: information-disclosure
cwe: 540
description: >
  Build pipelines that store secrets (API keys, deploy credentials, signing keys)
  as unmasked environment variables or in plaintext configuration files expose those
  secrets to every build job, log file, and engineer with pipeline read access.
  Exposed build secrets are a primary pivot path after CI/CD compromise — an attacker
  who gains access to build logs or pipeline environment can extract credentials for
  all downstream services the pipeline can reach.
impact: >
  Exposed build credentials typically include cloud provider keys (deploy access),
  registry credentials, and API keys for external services. An attacker who obtains
  these credentials can deploy malicious code, exfiltrate production data, or
  establish persistent access to cloud infrastructure.
asvs: V2 - Authentication Verification Requirements
cheat_sheet: https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
action: Store all build secrets in a dedicated secrets manager; never store secrets in env vars or code
mitigation: >
  Store build secrets in a dedicated secrets manager (HashiCorp Vault, AWS Secrets Manager,
  GitHub Encrypted Secrets, Azure Key Vault). Inject secrets as masked variables and
  ensure CI/CD platforms mask secret values in log output. Rotate secrets immediately
  if exposure is suspected. Never store secrets in environment variable defaults in
  pipeline configuration files.
  Tag the asset has-secrets-manager once secrets are properly managed.
check: >
  Are all build secrets stored in a dedicated secrets manager?
  Are secret values masked in all pipeline log outputs?
  Is there a secret rotation process documented and tested?
detection_logic: >
  In-scope technical assets with build-pipeline technology that have the
  may_contain_secrets attribute set and are not tagged with has-secrets-manager.
risk_assessment: >
  High when the build pipeline has access to production credentials.
  Medium for development-only pipelines with limited blast radius.
false_positives: >
  Build pipelines that access only non-secret configuration (environment names, feature flags).
  The may_contain_secrets technology attribute is what triggers this rule — if the pipeline
  genuinely does not handle secrets, use a technology type without that attribute.

controls:
  nist_800_53: [IA-5, SC-12, SC-28]
  iso_27001: [A.9.4.3, A.10.1.1]
  soc2_cc: [CC6.1, CC6.7]
  pci_dss_4: ["8.3.2", "3.5.1"]
  hipaa: ["164.312(a)(2)(iv)"]
  nis2: ["Art. 21(2)(g)"]
  cmmc: [IA.L2-3.5.10, SC.L2-3.13.10]
  owasp_top10_2021: [A02, A07]
  asvs_4: [V2.10, V6.4]

risk:
  id:
    parameter: tech_asset
    id: "{$risk.id}@{tech_asset.id}"

  data:
    parameter: tech_asset
    title: "<b>Build Secrets Exposure</b>: build pipeline <b>{tech_asset.title}</b> may expose secrets without a dedicated secrets manager"
    severity: "calculate_severity(likely, high)"
    exploitation_likelihood: likely
    exploitation_impact: high
    data_breach_probability: probable
    data_breach_technical_assets:
      - "{tech_asset.id}"
    most_relevant_technical_asset: "{tech_asset.id}"

  match:
    parameter: tech_asset
    do:
      - if:
          and:
            - false: "{tech_asset.out_of_scope}"
            - any:
                in: "{tech_asset.technologies}"
                true: "{.attributes.build-pipeline}"
            - any:
                in: "{tech_asset.technologies}"
                true: "{.attributes.may_contain_secrets}"
            - not:
                contains:
                  item: has-secrets-manager
                  in: "{tech_asset.tags}"
          then:
            return: true
