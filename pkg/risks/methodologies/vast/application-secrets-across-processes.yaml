id: application-secrets-across-processes
title: Application Threat - Strictly-Confidential Asset Bridges Business Process Contexts
function: operations
stride: information-disclosure
vast: application-threat
cwe: 287
description: >
  VAST Application Threat Model: a technical asset that supports business processes
  and stores or processes strictly-confidential data. Assets that bridge process
  contexts while holding sensitive credentials or secrets expose those secrets to
  any threat actor that targets any one of the supported processes, violating the
  least-privilege boundary between business processes.
impact: >
  Credential exposure in any one process context compromises all other processes
  the asset supports, amplifying the breach blast radius.
asvs: V2 - Authentication Verification Requirements
cheat_sheet: https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
action: Isolate strictly-confidential data per business process boundary
mitigation: >
  Issue separate service accounts and credentials scoped to individual process
  contexts. Use a secrets manager for per-process, short-lived credentials.
  Consider splitting the asset into process-specific instances.
check: >
  Are strictly-confidential data assets and credentials scoped to individual
  business processes rather than shared via a common technical asset?
detection_logic: >
  In-scope technical assets that support at least one business process AND process
  or store strictly-confidential data.
risk_assessment: >
  High when the asset is internet-accessible; medium for internal-only assets.
false_positives: >
  Shared identity providers (IdPs) architecturally designed to federate identity
  across processes with explicit isolation controls.

risk:
  id:
    parameter: tech_asset
    id: "{$risk.id}@{tech_asset.id}"

  data:
    parameter: tech_asset
    title: "<b>Cross-Process Credential Exposure</b>: <b>{tech_asset.title}</b> bridges business process contexts while handling strictly-confidential data"
    severity: "calculate_severity(likely, high)"
    exploitation_likelihood: likely
    exploitation_impact: high
    data_breach_probability: probable
    data_breach_technical_assets:
      - "{tech_asset.id}"
    most_relevant_technical_asset: "{tech_asset.id}"

  match:
    parameter: tech_asset
    do:
      - if:
          and:
            - false: "{tech_asset.out_of_scope}"
            - equal-or-greater:
                first: "{tech_asset.confidentiality}"
                second: strictly-confidential
                as: confidentiality
            - any:
                in: "{tech_asset.supported_business_processes}"
                item: bp
                not-equal:
                  first: "{bp}"
                  second: ""
          then:
            return: true
