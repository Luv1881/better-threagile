id: exposed-default-credentials
title: Asset Using Known Default or Hardcoded Credentials
function: operations
stride: information-disclosure
cwe: 1392
description: >
  Technical assets tagged as intentional-misconfiguration that store confidential
  data represent an immediately exploitable attack vector. Default credentials
  (e.g. minioadmin/minioadmin, admin/admin, postgres/postgres) are published in
  vendor documentation and are the first credentials an attacker tries after
  reaching the service network.
impact: >
  Any attacker with network access can authenticate using default credentials,
  exfiltrate all stored data, modify records, or pivot into adjacent systems.
asvs: V2 - Authentication Verification Requirements
cheat_sheet: https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html
action: Rotate all default credentials before deployment; store secrets in a secrets manager
mitigation: >
  Replace all default credentials with randomly generated secrets (minimum 32 chars).
  Store in a secrets manager (Vault, AWS Secrets Manager, etc.) rather than environment
  variables or compose files. Add credential rotation to the pre-deployment checklist.
check: >
  Are all service credentials rotated from vendor defaults? Are secrets stored in a
  dedicated secrets manager rather than plain environment variables?
detection_logic: >
  In-scope technical assets tagged with intentional-misconfiguration that store
  data assets rated at confidential or above.
risk_assessment: >
  High severity — default credentials plus confidential stored data equals a trivial
  full data breach with no exploitation skill required.
false_positives: >
  Development or ephemeral test environments where no real PII or confidential data
  is present. Set the asset out_of_scope or remove the intentional-misconfiguration
  tag once credentials are rotated.

risk:
  id:
    parameter: tech_asset
    id: "{$risk.id}@{tech_asset.id}"

  data:
    parameter: tech_asset
    title: "<b>Exposed Default Credentials</b>: <b>{tech_asset.title}</b> is tagged as intentional-misconfiguration and stores confidential data"
    severity: "calculate_severity(very-likely, high)"
    exploitation_likelihood: very-likely
    exploitation_impact: high
    data_breach_probability: probable
    data_breach_technical_assets:
      - "{tech_asset.id}"
    most_relevant_technical_asset: "{tech_asset.id}"

  match:
    parameter: tech_asset
    do:
      - if:
          and:
            - false: "{tech_asset.out_of_scope}"
            - contains:
                item: intentional-misconfiguration
                in: "{tech_asset.tags}"
          then:
            - assign:
                has_confidential_storage: false
            - loop:
                in: "{tech_asset.data_assets_stored}"
                item: data_id
                do:
                  - if:
                      equal-or-greater:
                        as: confidentiality
                        first: "{$model.data_assets.{data_id}.confidentiality}"
                        second: confidential
                      then:
                        - assign:
                            has_confidential_storage: true
            - if:
                true: "{has_confidential_storage}"
                then:
                  return: true
